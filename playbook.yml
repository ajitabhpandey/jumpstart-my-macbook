---
- name: Jumpstart a new macbook
  hosts: macbook
  gather_facts: true
  collections:
    - community.general

  pre_tasks:
    - name: Check Apple Silicon Homebrew path
      ansible.builtin.stat:
        path: /opt/homebrew/bin/brew
      register: brew_opt_homebrew
      tags: install

    - name: Check Intel Homebrew path
      ansible.builtin.stat:
        path: /usr/local/bin/brew
      register: brew_usr_local
      tags: install

    - name: Ensure sudo timestamp is available for Homebrew install
      ansible.builtin.command: sudo -n true
      changed_when: false
      when: not brew_opt_homebrew.stat.exists and not brew_usr_local.stat.exists
      tags: install

    - name: Install Homebrew
      ansible.builtin.shell: /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
      when: not brew_opt_homebrew.stat.exists and not brew_usr_local.stat.exists
      changed_when: true
      tags: install

    - name: Refresh Apple Silicon Homebrew path check
      ansible.builtin.stat:
        path: /opt/homebrew/bin/brew
      register: brew_opt_homebrew
      tags: install

    - name: Refresh Intel Homebrew path check
      ansible.builtin.stat:
        path: /usr/local/bin/brew
      register: brew_usr_local
      tags: install

    - name: Determine active Homebrew binary path
      ansible.builtin.set_fact:
        homebrew_path: "{{ '/opt/homebrew/bin' if brew_opt_homebrew.stat.exists else '/usr/local/bin' }}"
      tags: install, update

    - name: Ensure Homebrew was installed successfully
      ansible.builtin.assert:
        that:
          - brew_opt_homebrew.stat.exists or brew_usr_local.stat.exists
        fail_msg: Homebrew binary not found at /opt/homebrew/bin/brew or /usr/local/bin/brew.
      tags: install

    - name: Update Homebrew
      community.general.homebrew:
        update_homebrew: true
        path: "{{ homebrew_path }}"
      tags: install, update

  tasks:

    - name: Install Homebrew formulas
      community.general.homebrew:
        name: "{{ brew_formulas }}"
        state: present
        path: "{{ homebrew_path }}"
      tags: install, brew-apps

    - name: Install Homebrew cask applications
      community.general.homebrew_cask:
        name: "{{ brew_casks }}"
        state: present
        path: "{{ homebrew_path }}"
      tags: install, cask-apps

    - name: Configure Macbook
      ansible.builtin.include_tasks: configure.yml
      tags: configure
    
    - name: Install Dotfiles
      ansible.builtin.include_tasks: install_dotfiles.yml
      tags: dotfiles
    
