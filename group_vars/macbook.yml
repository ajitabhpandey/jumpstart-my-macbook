---
# list of applications to install
homedir_location: "{{ lookup('env','HOME') }}"

# Homebrew formulas grouped by purpose for easier maintenance.
brew_formula_groups:
  shell:
    - zoxide
    - zsh
  core_cli:
    - git
    - tree
    - httpie
    - curl
    - wget
    - ripgrep
    - universal-ctags
    - nmap
  cloud:
    - kubectl
    - helm
    - terraform
  languages:
    - go
    - node
    - python
    - php
  editors_and_sites:
    - vim
    - neovim
    - hugo
  media:
    - ffmpeg
    - imagemagick

brew_formulas: "{{ brew_formula_groups | dict2items | map(attribute='value') | flatten }}"

# Homebrew casks grouped by purpose for easier maintenance.
brew_cask_groups:
  terminals_and_browsers:
    - warp
    - iterm2
    - firefox
    - google-chrome
  system_tools:
    - keepingyouawake
    - bitwarden
    - visual-studio-code
    - slack
  virtualization:
    - orbstack
    - utm
  media_and_reading:
    - shotcut
    - gimp
    - vlc
    - calibre

brew_casks: "{{ brew_cask_groups | dict2items | map(attribute='value') | flatten }}"
  
